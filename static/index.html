<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Desk - AI Terminal</title>
    <link href="[https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap](https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap)" rel="stylesheet">
    <!-- O Manifesto -->
    <link rel="manifest" href="/static/manifest.json">

<!-- O Ícone para iPhone e Android -->
    <link rel="apple-touch-icon" href="/static/logo.png">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <meta name="theme-color" content="#005b9f">
    <style>
        :root { --bg-deep: #000000; --panel-bg: rgba(15, 15, 15, 0.8); --border-color: rgba(255, 255, 255, 0.15); --text-main: #ffffff; --text-muted: #888888; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-deep); background-image: radial-gradient(circle at 50% -20%, rgba(255, 255, 255, 0.1) 0%, transparent 60%), linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 100% 100%, 40px 40px, 40px 40px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; overflow-x: hidden; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .header-app { width: 100%; max-width: 1400px; margin-bottom: 30px; display: flex; align-items: center; gap: 15px; animation: fadeInUp 0.5s ease-out forwards; }
        .glitch-wrapper { position: relative; }
        h1.glitch { font-size: 2.2rem; font-weight: 700; color: #fff; position: relative; letter-spacing: -1px; }
        h1.glitch::before, h1.glitch::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-deep); }
        h1.glitch::before { left: 2px; text-shadow: -2px 0 #fff; clip: rect(24px, 550px, 90px, 0); animation: glitch-anim 3s infinite linear alternate-reverse; }
        h1.glitch::after { left: -2px; text-shadow: -2px 0 #888; clip: rect(85px, 550px, 140px, 0); animation: glitch-anim 2.5s infinite linear alternate-reverse; }
        @keyframes glitch-anim { 0% { clip: rect(10px, 9999px, 83px, 0); } 5% { clip: rect(65px, 9999px, 81px, 0); transform: translate(-2px, 2px); } 10% { clip: rect(48px, 9999px, 14px, 0); transform: translate(2px, -2px); } 15% { clip: rect(4px, 9999px, 60px, 0); transform: translate(-2px, -2px); } 20% { clip: rect(0, 0, 0, 0); transform: translate(0, 0); } 100% { clip: rect(0, 0, 0, 0); transform: translate(0, 0); } }
        .badge { background: #fff; color: #000; padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .container { display: flex; flex-direction: row; gap: 25px; width: 100%; max-width: 1400px; height: calc(100vh - 120px); min-height: 600px; }
        .painel { flex: 1; background: var(--panel-bg); border: 1px solid var(--border-color); padding: 30px; border-radius: 8px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8); display: flex; flex-direction: column; opacity: 0; animation: fadeInUp 0.6s ease-out forwards; transition: border-color 0.3s; }
        .painel:nth-child(2) { animation-delay: 0.15s; }
        
        .controles-painel { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .seletor-grupo { display: flex; gap: 15px; }
        .radio-hacker { position: relative; flex: 1; cursor: pointer; }
        .radio-hacker input { position: absolute; opacity: 0; cursor: pointer; }
        .radio-hacker span { display: block; text-align: center; padding: 10px; border: 1px solid #444; border-radius: 4px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; transition: all 0.2s; }
        .radio-hacker input:checked ~ span { border-color: #fff; color: #000; background: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .radio-hacker:hover span { border-color: #888; }
        
        h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: #fff; text-transform: uppercase; letter-spacing: 1px;}
        textarea#excel-input { flex: 1; width: 100%; padding: 20px; background: #050505; border: 1px solid var(--border-color); border-radius: 4px; color: #fff; font-size: 0.95rem; outline: none; resize: none; white-space: pre; transition: all 0.3s ease; font-family: 'Courier New', Courier, monospace; }
        textarea#excel-input:focus { border-color: #fff; box-shadow: inset 0 0 10px rgba(255,255,255,0.1); }
        textarea#excel-input::placeholder { color: #555; }
        button.btn-gerar { background: #fff; color: #000; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 16px; border: 1px solid #fff; border-radius: 4px; cursor: pointer; font-size: 1rem; transition: all 0.2s ease; margin-top: 20px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        button.btn-gerar:hover { background: #ccc; border-color: #ccc; transform: scale(0.99); }
        button.btn-gerar:disabled { background: #333; color: #666; border-color: #333; cursor: not-allowed; }
        .cabecalho-output { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--border-color); padding-bottom: 15px; margin-bottom: 20px; }
        button.btn-copiar { background: transparent; color: #fff; border: 1px solid #fff; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 0.85rem; text-transform: uppercase; }
        button.btn-copiar:hover { background: #fff; color: #000; }
        .area-resultado { flex: 1; background: #000; border-radius: 4px; padding: 20px; border: 1px solid #333; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        .area-resultado::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%); z-index: 2; background-size: 100% 4px; pointer-events: none; }
        pre { color: #fff; white-space: pre-wrap; word-wrap: break-word; font-family: 'Courier New', Courier, monospace; font-size: 0.95rem; overflow-y: auto; flex: 1; line-height: 1.6; padding-right: 10px; position: relative; z-index: 4; }
        .cursor-blink::after { content: '█'; animation: blink 1s step-end infinite; margin-left: 2px; color: #fff; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #444; } ::-webkit-scrollbar-thumb:hover { background: #fff; }
        .spinner { display: none; width: 16px; height: 16px; background-color: #000; animation: sk-rotateplane 1.2s infinite ease-in-out; }
        @keyframes sk-rotateplane { 0% { transform: perspective(120px) rotateX(0deg) rotateY(0deg); } 50% { transform: perspective(120px) rotateX(-180.1deg) rotateY(0deg); } 100% { transform: perspective(120px) rotateX(-180deg) rotateY(-179.9deg); } }
    </style>
</head>
<body>

    <div class="header-app">
        <div class="glitch-wrapper"><h1 class="glitch" data-text="DESK_AI">DESK_AI</h1></div>
        <span class="badge">SYS.N2</span>
    </div>

    <div class="container">
        <div class="painel">
            <h2>[INPUT_DATA]</h2>
            
            <div class="controles-painel">
                <div class="seletor-grupo">
                    <label class="radio-hacker">
                        <input type="radio" name="tipo_chamado" value="corporativo" checked>
                        <span>Corporativo</span>
                    </label>
                    <label class="radio-hacker">
                        <input type="radio" name="tipo_chamado" value="vip">
                        <span>VIP / Diretoria</span>
                    </label>
                </div>
            </div>

            <textarea id="excel-input" spellcheck="false" placeholder="> [MODO CORP]&#10;&#10;Cole: NOME, MATRÍCULA, FALHA e SOLUÇÃO&#10;Ex: Fabricia   f80903234   falha wifi, resolvido resetando router"></textarea>
            
            <button class="btn-gerar" id="btn-gerar" onclick="processarExcel()">
                <span class="spinner" id="spinner"></span>
                <span id="btn-texto">GERAR ABERTURA E FECHAMENTO</span>
            </button>
        </div>

        <div class="painel">
            <div class="cabecalho-output">
                <h2>[TERMINAL_OUT]</h2>
                <button class="btn-copiar" id="btn-copiar" onclick="copiarTexto()">Copiar Saída</button>
            </div>
            <div class="area-resultado">
                <pre id="resultadoTexto" class="cursor-blink"><span style="color: #666;">> Sistema pronto. C:\User\Aguardando_Input...</span></pre>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('input[type="radio"]').forEach((elem) => {
            elem.addEventListener("change", function(e) {
                const tipo = e.target.value;
                const textarea = document.getElementById("excel-input");
                if (tipo === "vip") {
                    textarea.placeholder = "> [MODO VIP]\n\nCole: NOME, FALHA e SOLUÇÃO\nEx: Fabricia   rede sem acesso, resolvido conectando vpn";
                } else {
                    textarea.placeholder = "> [MODO CORP]\n\nCole: NOME, MATRÍCULA, FALHA e SOLUÇÃO\nEx: Fabricia   f80903234   falha wifi, resolvido resetando router";
                }
            });
        });

        async function typewriterEffect(elemento, texto, velocidade = 5) {
            elemento.innerHTML = ''; 
            let i = 0;
            return new Promise((resolve) => {
                function digitar() {
                    if (i < texto.length) {
                        elemento.innerHTML += texto.charAt(i);
                        i++;
                        setTimeout(digitar, velocidade);
                    } else { resolve(); }
                }
                digitar();
            });
        }

        async function processarExcel() {
            const rawData = document.getElementById('excel-input').value;
            const displayResultado = document.getElementById('resultadoTexto');
            const btn = document.getElementById('btn-gerar');
            const btnTexto = document.getElementById('btn-texto');
            const spinner = document.getElementById('spinner');
            
            const tipoSelecionado = document.querySelector('input[name="tipo_chamado"]:checked').value;

            if (!rawData.trim()) {
                typewriterEffect(displayResultado, "> [ERRO]: Nenhum dado inserido.", 20);
                displayResultado.style.color = "#aaa";
                return;
            }

            btn.disabled = true;
            btnTexto.innerText = "PROCESSANDO...";
            btnTexto.style.color = "#666";
            spinner.style.display = "block";
            displayResultado.style.color = "#fff";
            
            await typewriterEffect(displayResultado, `> Protocolo: [${tipoSelecionado.toUpperCase()}]\n> Gerando Abertura e Fechamento em Lote...`, 15);

            const arrayDeChamados = [];
            const linhas = rawData.split('\n');

            for (let i = 0; i < linhas.length; i++) {
                const linha = linhas[i].trim();
                if (!linha) continue;

                if (tipoSelecionado === 'vip') {
                    const partes = linha.split(/\t|,/);
                    if (partes.length >= 2) {
                        arrayDeChamados.push({ nome: partes[0].trim(), matricula: "[BUSCAR_NO_BD]", falhas: partes[1].trim() });
                    } else {
                        const palavras = linha.split(' ');
                        const nome = palavras[0];
                        palavras.shift(); 
                        const falha = palavras.join(' '); 
                        arrayDeChamados.push({ nome: nome, matricula: "[BUSCAR_NO_BD]", falhas: falha });
                    }
                } else {
                    let colunas = linha.split(/\t|,/);
                    if (colunas.length >= 3) {
                        arrayDeChamados.push({ nome: colunas[0].trim(), matricula: colunas[1].trim(), falhas: colunas[2].trim() });
                    } else {
                        arrayDeChamados.push({ nome: colunas[0].trim(), matricula: "Não informada", falhas: colunas[1] ? colunas[1].trim() : "Falha não informada" });
                    }
                }
            }

            try {
                const resposta = await fetch('/gerar-ticket', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        tipo: tipoSelecionado, 
                        chamados: arrayDeChamados 
                    })
                });

                const dados = await resposta.json();

                if (dados.sucesso) {
                    displayResultado.style.color = "#fff"; 
                    await typewriterEffect(displayResultado, dados.ticket, 5); 
                } else {
                    displayResultado.style.color = "#aaa"; 
                    typewriterEffect(displayResultado, "> [API ERROR]:\n" + dados.erro, 20);
                }
            } catch (erro) {
                displayResultado.style.color = "#aaa";
                typewriterEffect(displayResultado, "> [ERRO] Servidor offline ou interno.", 20);
            } finally {
                btn.disabled = false;
                btnTexto.innerText = "GERAR ABERTURA E FECHAMENTO";
                btnTexto.style.color = "#000";
                spinner.style.display = "none";
            }
        }

        function copiarTexto() {
            const texto = document.getElementById('resultadoTexto').innerText;
            if(texto.includes("Aguardando") || texto.includes("Protocolo:") || texto.includes("[ERRO")) return;

            navigator.clipboard.writeText(texto).then(() => {
                const btn = document.getElementById('btn-copiar');
                btn.innerHTML = "[ COPIADO ]";
                btn.style.background = "#fff";
                btn.style.color = "#000";
                setTimeout(() => { 
                    btn.innerHTML = "Copiar Saída"; 
                    btn.style.background = "transparent";
                    btn.style.color = "#fff";
                }, 2000);
            });
        }
       if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js')
      .then(() => console.log("Pronto para instalar!"))
      .catch((erro) => console.log("Erro no SW:", erro));
  }
    </script>
    
</body>
</html>
